name: frontend

on:
  push:
    paths:
      - 'soren-front-end-master/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'soren-front-end-master/**'
      - '.github/workflows/frontend.yml'

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soren-front-end-master
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: soren-front-end-master/yarn.lock

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: CI=true yarn test --watchAll=false

      - name: Build
        run: yarn build

  frontend-playwright:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: soren-front-end-master
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: soren-front-end-master/yarn.lock

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e (optional)
        run: xvfb-run -a yarn test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            soren-front-end-master/playwright-report
            soren-front-end-master/test-results
          if-no-files-found: ignore
